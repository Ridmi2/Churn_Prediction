name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest httpx
      - run: pytest test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Push to Hugging Face
        run: git push https://ridmit3:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/ridmit3/churn-prediction-api main --force
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
