name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      - name: Run tests
        run: pytest test_api.py -v
      - name: Test summary
        if: always()
        run: echo "Tests completed!"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check secret exists
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "ERROR: HF_TOKEN is empty!"
          else
            echo "HF_TOKEN exists, length: ${#HF_TOKEN}"
          fi
      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          export HF_TOKEN=$HF_TOKEN
          HF_URL="https://ridmit3:${HF_TOKEN}@huggingface.co/spaces/ridmit3/churn-prediction-api"
          echo "URL length: ${#HF_URL}"
          git remote remove hf 2>/dev/null || true
          git remote add hf "$HF_URL"
          git push hf main --force