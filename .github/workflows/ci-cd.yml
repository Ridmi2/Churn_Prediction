name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest httpx
      - run: pytest test_api.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        run: |
          pip install huggingface_hub
          python -c "
          import subprocess, os
          token = os.environ['TOKEN']
          url = f'https://ridmit3:{token}@huggingface.co/spaces/ridmit3/churn-prediction-api'
          subprocess.run(['git', 'remote', 'add', 'huggingface', url], check=True)
          subprocess.run(['git', 'push', 'huggingface', 'main', '--force'], check=True)
          "
        env:
          TOKEN: ${{ secrets.HF_TOKEN }}
